name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-and-lint:
    name: 🛡️ Security Scan & Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Scan for Secret Leaks (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 👕 Code Linting
        run: npm run lint

      - name: 🔬 TypeScript Typechecking
        run: npm run typecheck

      - name: 🛑 Dependency Vulnerability Audit
        continue-on-error: true
        run: npm audit --audit-level=high --omit=dev

      - name: 🔍 SAST Code Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'

  build:
    name: 🏗️ Compile Production Bundle
    runs-on: ubuntu-latest
    needs: security-and-lint
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 💾 Inject Environment Secrets
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env

      - name: 🚀 Build Static Assets
        run: npm run build

      - name: 🗜️ Compress Build Folder
        run: tar -czf app.tar.gz dist/ server/ package.json package-lock.json .env

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: app.tar.gz
          retention-days: 2

  deploy:
    name: 🚀 Secure EC2 Atomic Deployment
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: .

      - name: 🛠️ Pre-Deployment Checks & Cleanup on EC2 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Aggressively cleaning disk space..."
            sudo rm -f /home/${{ secrets.EC2_USERNAME }}/*.tar.gz
            sudo apt-get clean
            if command -v pm2 >/dev/null 2>&1; then pm2 flush; fi
            sudo npm cache clean --force || true
            # Clean old releases aggressively (keep only 2)
            if [ -d /var/www/yantrabyte/releases ]; then
              cd /var/www/yantrabyte/releases
              ls -dt release_* 2>/dev/null | tail -n +3 | xargs -I {} sudo rm -rf {}
            fi
            sudo journalctl --vacuum-time=1d
            df -h
            sudo rm -rf /tmp/yantrabyte-deploy
            mkdir -p /tmp/yantrabyte-deploy

      - name: 📤 Copy Files to AWS EC2 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "app.tar.gz,scripts/deploy-ec2.sh"
          target: "/tmp/yantrabyte-deploy"

      - name: 🛠️ Execute Atomic Switch on EC2 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            sudo mkdir -p /var/www/yantrabyte/scripts
            sudo cp /tmp/yantrabyte-deploy/scripts/deploy-ec2.sh /var/www/yantrabyte/scripts/deploy-ec2.sh
            sudo chmod +x /var/www/yantrabyte/scripts/deploy-ec2.sh
            # Move the archive to where the deploy script expects it
            sudo cp /tmp/yantrabyte-deploy/app.tar.gz /home/${{ secrets.EC2_USERNAME }}/app.tar.gz
            # Run the deployment script
            sudo /var/www/yantrabyte/scripts/deploy-ec2.sh
            # Clean up
            sudo rm -rf /tmp/yantrabyte-deploy /home/${{ secrets.EC2_USERNAME }}/app.tar.gz /home/${{ secrets.EC2_USERNAME }}/scripts

  deploy-edge-functions:
    name: ☁️ Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔐 Login & Deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set. Skipping Edge Function deploy."
            exit 0
          fi
          supabase login --token "$SUPABASE_ACCESS_TOKEN" || true
          supabase secrets set --project-ref eyajwjrafudarccvcada \
            GMAIL_USER="${{ secrets.GMAIL_USER }}" \
            GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}" || true
          supabase functions deploy send-ticket-email \
            --project-ref eyajwjrafudarccvcada || true
