name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-and-lint:
    name: 🛡️ Security Scan & Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Scan for Secret Leaks (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 👕 Code Linting
        run: npm run lint

      - name: 🔬 TypeScript Typechecking
        run: npm run typecheck

      - name: 🛑 Dependency Vulnerability Audit
        run: npm audit --audit-level=high

      - name: 🔍 SAST Code Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'

  build:
    name: 🏗️ Compile Production Bundle
    runs-on: ubuntu-latest
    needs: security-and-lint
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 💾 Inject Environment Secrets
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: 🚀 Build Static Assets
        run: npm run build

      - name: 🗜️ Compress Build Folder
        run: tar -czf app.tar.gz dist/ server/ package.json package-lock.json

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: app.tar.gz
          retention-days: 2

  deploy:
    name: 🚀 Secure EC2 Atomic Deployment
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: .

      - name: 📤 Copy Files to AWS EC2 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "app.tar.gz,scripts/deploy-ec2.sh"
          target: "/home/${{ secrets.EC2_USERNAME }}/"

      - name: 🛠️ Execute Atomic Switch on EC2 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            sudo mkdir -p /var/www/yantrabyte/scripts
            sudo cp /home/${{ secrets.EC2_USERNAME }}/scripts/deploy-ec2.sh /var/www/yantrabyte/scripts/deploy-ec2.sh
            sudo chmod +x /var/www/yantrabyte/scripts/deploy-ec2.sh
            sudo /var/www/yantrabyte/scripts/deploy-ec2.sh
            # Clean up home directory
            rm -rf /home/${{ secrets.EC2_USERNAME }}/app.tar.gz /home/${{ secrets.EC2_USERNAME }}/scripts

  deploy-edge-functions:
    name: ☁️ Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔐 Login & Deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Token length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:10}..."
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set. Skipping."
            exit 0
          fi
          if ! supabase login --token "$SUPABASE_ACCESS_TOKEN"; then
            echo "::error::Supabase login failed"
            exit 1
          fi
          echo "Login OK"
          supabase secrets set --project-ref eyajwjrafudarccvcada \
            GMAIL_USER="${{ secrets.GMAIL_USER }}" \
            GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}"
          echo "Secrets set OK (or skipped)"
          if supabase functions deploy send-ticket-email --project-ref eyajwjrafudarccvcada; then
            echo "Function deployed OK"
            echo "URL: https://eyajwjrafudarccvcada.supabase.co/functions/v1/send-ticket-email"
          else
            echo "::error::Function deploy failed"
            exit 1
          fi
