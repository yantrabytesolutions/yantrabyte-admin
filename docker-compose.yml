version: '3.8'
services:
  api:
    build: .
    container_name: ybs-api
    ports:
      - "4000:4000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/backups/public-service-ticket"]
      interval: 30s
      timeout: 10s
      retries: 3
